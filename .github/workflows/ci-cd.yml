name: CI/CD

on:
  push:
    branches:
      - main
      - ci-cd
  pull_request:
    branches:
      - "*"

jobs:
  lint:
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

#      - name: Init .env
#        run: echo "$DOT_ENV" > .env
#        env:
#          DOT_ENV: ${{ secrets.DOT_ENV }}

      - name: Build
        run: docker compose build

      - name: Check lint (backend)
        run: docker compose run --rm backend ruff check .

      - name: Check lint (frontend)
        run: docker compose run --rm frontend npx prettier --check .

  tests:
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

#      - name: Init .env
#        run: echo "$DOT_ENV" > .env
#        env:
#          DOT_ENV: ${{ secrets.DOT_ENV }}

      - name: Init python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r gantt-backend/requirements.txt

#      - name: Build
#        run: docker compose build

      - name: Run tests (backend)
        run: pytest
