name: CI/CD

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "*"

jobs:
  lint:
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Init .env
        run: echo "$DOT_ENV" > .env
        env:
          DOT_ENV: ${{ secrets.DOT_ENV }}

      - name: Build
        run: docker compose build

      - name: Check lint (backend)
        run: docker compose run --rm backend ruff check .

      - name: Check lint (frontend)
        run: docker compose run --rm frontend npx prettier --check .

  tests:
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Init .env
        run: echo "$DOT_ENV" > .env
        env:
          DOT_ENV: ${{ secrets.DOT_ENV }}

      - name: Init python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r gantt-backend/requirements.txt

      - name: Run tests (backend)
        run: pytest

  build:
    runs-on: ubuntu-22.04
    needs: [lint, tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Init .env
        run: echo "$DOT_ENV" > .env
        env:
          DOT_ENV: ${{ secrets.DOT_ENV }}

      - name: Github registry login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push
        run: |
          docker compose build
          docker compose push
        env:
          IMAGE_REPO: ghcr.io/${{ github.repository }}
          IMAGE_TAG: ${{ github.sha }}

  deploy:
    runs-on: ubuntu-22.04
    needs: [build]
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            echo ${{ secrets.REGISTRY_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /var/www/task-tracker/task-tracker-service
            echo "$DOT_ENV" > .env
            
            export IMAGE_REPO=ghcr.io/${{ github.repository }}
            export IMAGE_TAG=${{ github.sha }}
            
            docker-compose pull
            docker-compose down
            docker-compose up -d
          envs: DOT_ENV
        env:
          DOT_ENV: ${{ secrets.DOT_ENV }}
